version: "3.9"

services:
  frontend:
    build: ./frontendboarding
    network_mode: "host"
    volumes:
    - ./frontendboarding:/app
    command: npm run dev
    depends_on:
      - backend

  backend:
    build: ./backend-boarding
    network_mode: "host"
    volumes:
      - ./backend-boarding:/app
      - /app/node_modules
    depends_on:
      - db
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}

  db:
    image: postgres:15
    restart: always
    env_file:
      - .env
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: